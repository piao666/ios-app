name: ShipSwift Integration

on:
  workflow_dispatch:  # 仅手动触发，用于 ShipSwift 集成测试
  push:
    branches: [ main ]
    paths:
      - '**.swift'
      - '**.plist'
      - '**.xcodeproj/**'

jobs:
  shipswift-build:
    runs-on: macos-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup ShipSwift environment
      working-directory: ./iOS-Expense-Tracker
      run: |
        echo "=== Setting up ShipSwift compatible environment ==="
        
        # 安装必要的工具
        brew install swiftformat swiftlint || true
        
        # 创建 ShipSwift 配置文件
        mkdir -p .shipswift
        
        cat > .shipswift/config.json << 'EOF'
        {
          "project": {
            "name": "ExpenseTracker",
            "bundleId": "com.haizong.ExpenseTracker",
            "version": "1.0.0",
            "build": 1
          },
          "build": {
            "scheme": "ExpenseTracker",
            "configuration": "Release",
            "destination": "generic/platform=iOS"
          },
          "distribution": {
            "method": "development",
            "teamId": "",
            "exportOptions": "development"
          },
          "notifications": {
            "slack": false,
            "email": false,
            "webhook": "${{ secrets.SHIPSWIFT_WEBHOOK }}"
          }
        }
        EOF
        
        cat > .shipswift/build.sh << 'EOF'
        #!/bin/bash
        
        # ShipSwift 构建脚本
        echo "🚢 ShipSwift Build Script"
        echo "Project: ExpenseTracker"
        echo "Bundle ID: com.haizong.ExpenseTracker"
        
        # 清理
        rm -rf build
        mkdir -p build
        
        # 代码质量检查
        if command -v swiftformat &> /dev/null; then
          echo "📝 Running swiftformat..."
          swiftformat . --quiet || true
        fi
        
        if command -v swiftlint &> /dev/null; then
          echo "🔍 Running swiftlint..."
          swiftlint --quiet || true
        fi
        
        # 构建
        echo "🏗️ Building project..."
        xcodebuild clean build \
          -project ExpenseTracker.xcodeproj \
          -scheme ExpenseTracker \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath build/ExpenseTracker.xcarchive \
          CODE_SIGNING_ALLOWED=YES \
          CODE_SIGN_IDENTITY="Apple Development" \
          DEVELOPMENT_TEAM="" \
          | xcpretty
        
        if [ $? -eq 0 ]; then
          echo "✅ Build successful!"
          
          # 创建构建信息文件
          cat > build/build-info.json << 'EOF2'
        {
          "success": true,
          "project": "ExpenseTracker",
          "bundleId": "com.haizong.ExpenseTracker",
          "timestamp": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
          "commit": "${{ github.sha }}",
          "branch": "${{ github.ref_name }}",
          "buildNumber": 1,
          "platform": "iOS",
          "xcodeVersion": "$(xcodebuild -version | head -n1)"
        }
        EOF2
          
          # 尝试导出 IPA（需要完整签名配置）
          echo "📦 Attempting to create IPA..."
          cat > build/ExportOptions.plist << 'EOF2'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string></string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>signingCertificate</key>
            <string>Apple Development</string>
        </dict>
        </plist>
        EOF2
        
        else
          echo "❌ Build failed!"
          exit 1
        fi
        EOF
        
        chmod +x .shipswift/build.sh
        
    - name: Run ShipSwift build
      working-directory: ./iOS-Expense-Tracker
      run: |
        ./.shipswift/build.sh
        
    - name: Upload ShipSwift artifacts
      uses: actions/upload-artifact@v4
      with:
        name: shipswift-build-${{ github.run_number }}
        path: |
          iOS-Expense-Tracker/build/
          iOS-Expense-Tracker/.shipswift/
        retention-days: 90
        
    - name: Generate ShipSwift report
      run: |
        echo "## 🚢 ShipSwift Build Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Build Configuration" >> $GITHUB_STEP_SUMMARY
        echo "- **Project**: ExpenseTracker" >> $GITHUB_STEP_SUMMARY
        echo "- **Bundle ID**: com.haizong.ExpenseTracker" >> $GITHUB_STEP_SUMMARY
        echo "- **Platform**: iOS" >> $GITHUB_STEP_SUMMARY
        echo "- **Build Type**: Development" >> $GITHUB_STEP_SUMMARY
        echo "- **Project Path**: iOS-Expense-Tracker/" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
        echo "Build artifacts are available for download in the Artifacts section." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Next Steps for Side-loading" >> $GITHUB_STEP_SUMMARY
        echo "1. Download the build artifacts" >> $GITHUB_STEP_SUMMARY
        echo "2. For IPA export, proper code signing is required" >> $GITHUB_STEP_SUMMARY
        echo "3. Consider using services like:" >> $GITHUB_STEP_SUMMARY
        echo "   - [AppDB](https://appdb.to) for signing" >> $GITHUB_STEP_SUMMARY
        echo "   - [AltStore](https://altstore.io) with AltServer" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### ShipSwift MCP Integration" >> $GITHUB_STEP_SUMMARY
        echo "To integrate with ShipSwift MCP server:" >> $GITHUB_STEP_SUMMARY
        echo "```bash" >> $GITHUB_STEP_SUMMARY
        echo "# Install ShipSwift MCP server" >> $GITHUB_STEP_SUMMARY
        echo "npm install -g @shipswift/mcp-server" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "# Configure in Claude Desktop or VS Code" >> $GITHUB_STEP_SUMMARY
        echo "# Add to mcpServers in settings:" >> $GITHUB_STEP_SUMMARY
        echo '"shipswift": { "command": "npx", "args": ["@shipswift/mcp-server"] }' >> $GITHUB_STEP_SUMMARY
        echo "```" >> $GITHUB_STEP_SUMMARY