name: ShipSwift Integration

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "iOS-Expense-Tracker/**/*.swift"
      - "iOS-Expense-Tracker/**/*.plist"
      - "iOS-Expense-Tracker/project.yml"

jobs:
  shipswift-build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ./iOS-Expense-Tracker
        run: xcodegen generate

      - name: Build release target
        working-directory: ./iOS-Expense-Tracker
        run: |
          xcodebuild clean build \
            -project ExpenseTracker.xcodeproj \
            -scheme ExpenseTracker \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Generate summary
        run: |
          echo "## ShipSwift Compatibility" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Project generation: success" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release build: success" >> "$GITHUB_STEP_SUMMARY"
          echo "- Signing skipped intentionally for CI" >> "$GITHUB_STEP_SUMMARY"
