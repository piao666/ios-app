name: Build IPA for Side-loading

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow
        run: pip install Pillow

      - name: Prepare app icons
        working-directory: ./iOS-Expense-Tracker
        run: |
          if [ ! -f "AppLogo-1024.png" ]; then
            python3 - <<'PY'
            from PIL import Image
            img = Image.new("RGB", (1024, 1024), color=(42, 122, 255))
            img.save("AppLogo-1024.png", "PNG")
            print("Generated placeholder logo.")
            PY
          fi
          python3 generate_icons.py AppLogo-1024.png

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ./iOS-Expense-Tracker
        run: xcodegen generate

      - name: Build release app
        working-directory: ./iOS-Expense-Tracker
        run: |
          xcodebuild clean build \
            -project ExpenseTracker.xcodeproj \
            -scheme ExpenseTracker \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath build

      - name: Package IPA
        working-directory: ./iOS-Expense-Tracker
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/ExpenseTracker.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "Build output not found: $APP_PATH"
            exit 1
          fi
          rm -rf Payload ExpenseTracker.ipa
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry ExpenseTracker.ipa Payload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExpenseTracker-App
          path: iOS-Expense-Tracker/ExpenseTracker.ipa
          retention-days: 7
