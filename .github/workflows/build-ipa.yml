name: Build IPA for Side-loading

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Xcode Project with XcodeGen
        working-directory: ./iOS-Expense-Tracker
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build Project
        working-directory: ./iOS-Expense-Tracker
        run: xcodebuild clean build -project ExpenseTracker.xcodeproj -scheme ExpenseTracker -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO

      - name: Create IPA Package
        working-directory: ./iOS-Expense-Tracker
        run: |
          # 创建 Payload 文件夹
          mkdir -p Payload
          
          # 查找生成的 .app 文件
          APP_PATH=$(find ./build -name "*.app" -type d | head -1)
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: No .app file found in build directory"
            find ./build -type d
            exit 1
          fi
          
          echo "Found app at: $APP_PATH"
          
          # 复制 .app 到 Payload 文件夹
          cp -R "$APP_PATH" Payload/
          
          # 压缩为 IPA 文件
          zip -r ExpenseTracker.ipa Payload
          
          # 检查 IPA 文件是否创建成功
          if [ -f "ExpenseTracker.ipa" ]; then
            echo "✅ IPA file created successfully: ExpenseTracker.ipa"
            ls -lh ExpenseTracker.ipa
          else
            echo "❌ Failed to create IPA file"
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExpenseTracker-App
          path: ./iOS-Expense-Tracker/ExpenseTracker.ipa
          retention-days: 7

name: Build IPA for Side-loading

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Xcode Project with XcodeGen
        working-directory: ./iOS-Expense-Tracker
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build Project
        working-directory: ./iOS-Expense-Tracker
        run: xcodebuild clean build -project ExpenseTracker.xcodeproj -scheme ExpenseTracker -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO -derivedDataPath build

      - name: Package IPA
        working-directory: ./iOS-Expense-Tracker
        run: |
          mkdir -p Payload
          mv build/Build/Products/Release-iphoneos/ExpenseTracker.app Payload/
          zip -r ExpenseTracker.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExpenseTracker-App
          path: iOS-Expense-Tracker/ExpenseTracker.ipa
          retention-days: 7