name: Build IPA for Side-loading

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Xcode Project with XcodeGen
        working-directory: ./iOS-Expense-Tracker
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build Project
        working-directory: ./iOS-Expense-Tracker
        run: xcodebuild clean build -project ExpenseTracker.xcodeproj -scheme ExpenseTracker -configuration Release -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" -derivedDataPath build

      - name: Package IPA
        working-directory: ./iOS-Expense-Tracker
        run: |
          mkdir -p Payload
          mv build/Build/Products/Release-iphoneos/ExpenseTracker.app Payload/
          zip -r ExpenseTracker.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExpenseTracker-App
          path: iOS-Expense-Tracker/ExpenseTracker.ipa
          retention-days: 7