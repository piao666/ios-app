name: Build IPA for Side-loading

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python for icon generation
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Pillow
        run: pip install Pillow

      - name: Generate App Icons
        working-directory: ./iOS-Expense-Tracker
        run: |
          if [ -f "Assets.xcassets/BrandLogo.imageset/brand-logo.png" ]; then
            echo "Found BrandLogo source, generating app icons"
            cp Assets.xcassets/BrandLogo.imageset/brand-logo.png AppLogo-1024.png
            python3 generate_icons.py Assets.xcassets/BrandLogo.imageset/brand-logo.png
          elif [ -f "AppLogo-1024.png" ]; then
            echo "Found AppLogo source, generating app icons"
            python3 generate_icons.py AppLogo-1024.png
          else
            echo "No source logo found, generating placeholder icon"
            mkdir -p Assets.xcassets/AppIcon.appiconset
            python3 -c "from PIL import Image; Image.new('RGB', (1024, 1024), color=(200, 150, 200)).save('AppLogo-1024.png', 'PNG'); print('created placeholder icon')"
            python3 generate_icons.py AppLogo-1024.png
          fi

      - name: Generate Xcode Project with XcodeGen
        working-directory: ./iOS-Expense-Tracker
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Build Project
        working-directory: ./iOS-Expense-Tracker
        run: |
          xcodebuild clean build \
            -project ExpenseTracker.xcodeproj \
            -scheme ExpenseTracker \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            -derivedDataPath build

      - name: Package IPA
        working-directory: ./iOS-Expense-Tracker
        run: |
          if [ -d "build/Build/Products/Release-iphoneos/ExpenseTracker.app" ]; then
            mkdir -p Payload
            cp -r build/Build/Products/Release-iphoneos/ExpenseTracker.app Payload/
            zip -r ExpenseTracker.ipa Payload
            echo "IPA packaged successfully"
          else
            echo "Build artifact not found"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ExpenseTracker-App
          path: iOS-Expense-Tracker/ExpenseTracker.ipa
          retention-days: 7
