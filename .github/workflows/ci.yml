name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ./iOS-Expense-Tracker
        run: xcodegen generate

      - name: Run unit tests
        working-directory: ./iOS-Expense-Tracker
        run: |
          xcodebuild test \
            -project ExpenseTracker.xcodeproj \
            -scheme ExpenseTracker \
            -destination 'platform=macOS,arch=arm64,variant=Designed for [iPad,iPhone],name=My Mac' \
            CODE_SIGNING_ALLOWED=NO
