name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Xcode Project with XcodeGen
        working-directory: ./iOS-Expense-Tracker
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Run Unit Tests
        working-directory: ./iOS-Expense-Tracker
        run: |
          DEVICE_NAME=$(xcrun simctl list devices available | grep -E "iPhone [0-9]+" | head -n 1 | sed -E 's/^[[:space:]]*([^()]+) \(.*$/\1/' | xargs)
          echo "Using simulator: ${DEVICE_NAME}"
          xcodebuild test \
            -project ExpenseTracker.xcodeproj \
            -scheme ExpenseTracker \
            -destination "platform=iOS Simulator,name=${DEVICE_NAME}" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
