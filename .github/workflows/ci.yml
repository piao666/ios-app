name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Xcode Project with XcodeGen
        working-directory: ./iOS-Expense-Tracker
        run: |
          brew install xcodegen
          xcodegen generate

      - name: Run Unit Tests
        working-directory: ./iOS-Expense-Tracker
        run: |
          xcodebuild test \
            -project ExpenseTracker.xcodeproj \
            -scheme ExpenseTracker \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
