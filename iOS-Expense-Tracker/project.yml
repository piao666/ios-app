name: ExpenseTracker
options:
  bundleIdPrefix: com.openclaw.expenses
  deploymentTarget:
    iOS: "17.0"

settings:
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  SWIFT_VERSION: 5.9

targets:
  ExpenseTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        includes:
          - "*.swift"
          - "Models/**/*.swift"
          - "Views/**/*.swift"
        excludes:
          - "*Tests.swift"
          - "Tests/**"
    settings:
      PRODUCT_NAME: ExpenseTracker
      PRODUCT_BUNDLE_IDENTIFIER: com.openclaw.expenses
      DEVELOPMENT_TEAM: ""
      CODE_SIGN_IDENTITY: "Apple Development"
      CODE_SIGNING_REQUIRED: YES
      CODE_SIGNING_ALLOWED: YES
      PROVISIONING_PROFILE_SPECIFIER: ""
    info:
      properties:
        CFBundleName: ExpenseTracker
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        CFBundlePackageType: APPL
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: com.openclaw.expenses
        UILaunchStoryboardName: LaunchScreen
        NSLocalNetworkUsageDescription: "This app may use your local network to sync data"
        UIApplicationSceneManifest:
          UIApplicationSupportMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration

  ExpenseTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        includes:
          - "*Tests.swift"
    dependencies:
      - target: ExpenseTracker
    settings:
      PRODUCT_NAME: ExpenseTrackerTests
      TEST_TARGET_NAME: ExpenseTracker

