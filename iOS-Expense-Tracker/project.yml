name: ExpenseTracker
options:
  bundleIdPrefix: com.piao
  deploymentTarget:
    iOS: "16.0"

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "16.0"

schemes:
  ExpenseTracker:
    build:
      parallelizeBuildables: true
      buildImplicitDependencies: true
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  ExpenseTracker:
    type: application
    platform: iOS
    deploymentTarget: "16.0"

    sources:
      - path: "./ExpenseTrackerApp.swift"
      - path: "./Theme.swift"
      - path: "./Models"
      - path: "./Views"

    resources:
      - path: "./Assets.xcassets"
        optional: false
      - path: "./AppLogo-1024.png"
        optional: true

    settings:
      PRODUCT_NAME: ExpenseTracker
      ORGANIZATIONNAME: PiaoDahai
      PRODUCT_BUNDLE_IDENTIFIER: com.piao.expenses

    dependencies:
      - target: ExpenseTrackerTests
        implicit: true
        type: test

  ExpenseTrackerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: "./"
    dependencies:
      - target: ExpenseTracker
