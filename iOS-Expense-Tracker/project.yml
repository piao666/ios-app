name: ExpenseTracker
options:
  bundleIdPrefix: com.yourname
  deploymentTarget:
    iOS: "17.0"

settings:
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  SWIFT_VERSION: 5.9

targets:
  ExpenseTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        includes:
          - "*.swift"
          - "Models/**/*.swift"
          - "Views/**/*.swift"
        excludes:
          - "project.yml"
          - "*Tests.swift"
    dependencies:
      - framework: Charts
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.ExpenseTracker
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SWIFT_VERSION: 5.9
    info:
      properties:
        CFBundleName: ExpenseTracker
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: LaunchScreen
        UIApplicationSceneManifest:
          UIApplicationSupportMultipleScenes: true
          UISceneConfigurations:
            UIWindowSceneSessionRoleApplication:
              - UISceneConfigurationName: Default Configuration

  ExpenseTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        includes:
          - "*Tests.swift"
    dependencies:
      - target: ExpenseTracker
    settings:
      PRODUCT_NAME: ExpenseTrackerTests
      TEST_TARGET_NAME: ExpenseTracker
