name: ExpenseTracker
options:
  bundleIdPrefix: com.piao
  deploymentTarget:
    iOS: "17.0"

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"
  CODE_SIGNING_ALLOWED: "NO"
  CODE_SIGN_IDENTITY: ""
  CODE_SIGNING_REQUIRED: "NO"

schemes:
  ExpenseTracker:
    build:
      targets:
        ExpenseTracker: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ExpenseTrackerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  ExpenseTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    info:
      path: ./Config/Info.plist
    sources:
      - path: ./AppMain.swift
      - path: ./SourcesV2
    resources:
      - path: ./Assets.xcassets
      - path: ./LaunchScreen.storyboard
      - path: ./AppLogo-1024.png
        optional: true
    settings:
      PRODUCT_NAME: ExpenseTracker
      PRODUCT_BUNDLE_IDENTIFIER: com.piao.expenses
      SWIFT_VERSION: "5.9"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      TARGETED_DEVICE_FAMILY: "1,2"
      INFOPLIST_FILE: Config/Info.plist
      GENERATE_INFOPLIST_FILE: "NO"
      INFOPLIST_KEY_CFBundleDisplayName: 小海帐
      INFOPLIST_KEY_CFBundleName: 小海帐
      INFOPLIST_KEY_NSMicrophoneUsageDescription: 小海帐需要麦克风权限，用于语音记账。
      INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: 小海帐需要语音识别权限，把你的语音转成记账内容。
      CODE_SIGNING_ALLOWED: "NO"
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: "NO"

  ExpenseTrackerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ./TestsV2
    dependencies:
      - target: ExpenseTracker
    settings:
      GENERATE_INFOPLIST_FILE: YES
      PRODUCT_BUNDLE_IDENTIFIER: com.piao.expenses.tests
