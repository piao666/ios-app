name: ExpenseTracker
options:
  bundleIdPrefix: com.yourname
targets:
  ExpenseTracker:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - Models
      - Views
      - AppDelegate.swift
      - ExpenseTrackerApp.swift
      - Theme.swift
      - LaunchScreen.storyboard
      - Info.plist
    resources:
      - path: Assets.xcassets
        optional: true
    dependencies:
      - framework: Charts
    settings:
      base:
        INFOPLIST_FILE: Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.yourname.ExpenseTracker
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon